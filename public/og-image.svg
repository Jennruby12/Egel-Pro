<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Acento decorativo: circulo brand -->
  <circle cx="1050" cy="100" r="180" fill="#38bdf8" opacity="0.08"/>
  <circle cx="150" cy="530" r="220" fill="#a78bfa" opacity="0.08"/>

  <!-- Borde sutil -->
  <rect x="20" y="20" width="1160" height="590" rx="24" ry="24"
        fill="none" stroke="#374151" stroke-width="2"/>

  <!-- Marca: EGELPro -->
  <text x="80" y="240" font-family="Inter, system-ui, sans-serif"
        font-size="96" font-weight="800" fill="url(#brandGradient)">
    EGELPro
  </text>

  <!-- Tagline principal -->
  <text x="80" y="340" font-family="Inter, system-ui, sans-serif"
        font-size="48" font-weight="700" fill="#f9fafb">
    Preparate para el EGEL Plus ISOFT
  </text>

  <!-- Subtitulo -->
  <text x="80" y="410" font-family="Inter, system-ui, sans-serif"
        font-size="28" font-weight="500" fill="#9ca3af">
    Simulador · Guias · Gamificacion
  </text>

  <!-- Pildora CENEVAL -->
  <rect x="80" y="470" width="220" height="56" rx="28" ry="28"
        fill="#38bdf8" opacity="0.15" stroke="#38bdf8" stroke-width="2"/>
  <text x="190" y="506" font-family="Inter, system-ui, sans-serif"
        font-size="22" font-weight="600" fill="#38bdf8"
        text-anchor="middle">
    CENEVAL Mexico
  </text>
</svg>
